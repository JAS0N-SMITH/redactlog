name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - run: golangci-lint run

  test:
    name: Test (Go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJson('["ubuntu-latest","macos-latest"]') || fromJson('["ubuntu-latest"]') }}
        # go.mod requires Go 1.25.9; "1.25" picks the latest 1.25.x patch on
        # the runner, "stable" tracks the latest minor (1.26+ when released).
        go: ${{ github.event_name == 'push' && fromJson('["1.25","stable"]') || fromJson('["1.25"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        run: go tool cover -func=coverage.out | tail -1

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...
