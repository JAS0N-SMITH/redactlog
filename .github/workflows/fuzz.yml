name: Fuzz

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: "./redact", target: "FuzzDSLParse", time: "60s" }
          - { pkg: "./redact", target: "FuzzRedactValue", time: "60s" }
          - { pkg: "./redact", target: "FuzzLuhn", time: "60s" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Run short fuzz
        if: matrix.target == ''
        run: go test -run=^$ -short ./...

      - name: Run fuzz target
        if: matrix.target != ''
        run: |
          TIME=${{ matrix.time }}
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TIME=10m
          fi
          go test -run=^$ -fuzz=^${{ matrix.target }}$ -fuzztime=$TIME ${{ matrix.pkg }}
