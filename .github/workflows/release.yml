name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # to create GitHub Release and upload artifacts
  id-token: write  # for SBOM attestation (goreleaser v2)

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
